<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应用版本管理 - Channel Service 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar { width: 240px; }
        .main-content { margin-left: 240px; }
        @media (max-width: 768px) { 
            .sidebar { width: 100%; position: static; } 
            .main-content { margin-left: 0; } 
        }
        .nav-item.active { background: #3730a3; color: #fff; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
        .badge-green  { background: #d1fae5; color: #065f46; }
        .badge-red    { background: #fee2e2; color: #991b1b; }
        .badge-blue   { background: #dbeafe; color: #1e40af; }
        .badge-gray   { background: #f3f4f6; color: #374151; }
        .badge-yellow { background: #fef3c7; color: #b45309; }
        .badge-indigo { background: #e0e7ff; color: #3730a3; }
        .modal-backdrop { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 40; }
        .modal-backdrop.show { display: flex; align-items: center; justify-content: center; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: #374151; font-size: 0.875rem; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 0.375rem; font-size: 0.875rem; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .checkbox-group { display: flex; align-items: center; gap: 0.5rem; }
        .checkbox-group input[type="checkbox"] { width: 1rem; height: 1rem; }
        .btn { padding: 0.5rem 1rem; border-radius: 0.375rem; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.2s; border: none; }
        .btn-primary { background: #4f46e5; color: white; }
        .btn-primary:hover { background: #4338ca; }
        .btn-secondary { background: #6b7280; color: white; }
        .btn-secondary:hover { background: #4b5563; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .alert { padding: 1rem; border-radius: 0.375rem; margin-bottom: 1rem; }
        .alert-success { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
        .alert-error { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
        .alert-info { background: #dbeafe; color: #1e40af; border-left: 4px solid #3b82f6; }
        .loading { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 50; }
        .loading.show { display: block; }
        .spinner { border: 4px solid #f3f4f6; border-top: 4px solid #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .table-responsive { overflow-x: auto; }
        .status-indicator { display: inline-block; width: 0.5rem; height: 0.5rem; border-radius: 50%; margin-right: 0.5rem; }
        .status-active { background: #10b981; }
        .status-inactive { background: #6b7280; }
    </style>
</head>
<body class="bg-gray-100">

<!-- 侧边栏 -->
<div class="sidebar bg-gray-900 text-white fixed top-0 left-0 h-full flex flex-col">
    <div class="p-5 border-b border-gray-800">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                <i class="fas fa-shield-alt text-white text-sm"></i>
            </div>
            <div>
                <p class="font-bold text-sm">管理后台</p>
                <p class="text-gray-500 text-xs">Channel Service</p>
            </div>
        </div>
    </div>

    <nav class="flex-1 p-3 space-y-1">
        <a href="/admin/dashboard"
           class="nav-item flex items-center gap-3 py-2 px-3 rounded-lg text-gray-300 hover:bg-gray-700 text-sm transition">
            <i class="fas fa-chart-pie w-4"></i> 仪表板
        </a>
        <a href="#" onclick="return false;"
           class="nav-item active flex items-center gap-3 py-2 px-3 rounded-lg text-gray-300 hover:bg-gray-700 text-sm transition">
            <i class="fas fa-box w-4"></i> 版本发布
        </a>
    </nav>

    <div class="p-3 border-t border-gray-800">
        <a href="/admin/logout"
           class="flex items-center gap-2 py-2 px-3 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 text-sm transition">
            <i class="fas fa-sign-out-alt w-4"></i> 退出登录
        </a>
    </div>
</div>

<!-- 主内容 -->
<div class="main-content min-h-screen">
    <header class="bg-white border-b border-gray-200 px-8 py-4 flex items-center justify-between">
        <h2 class="text-lg font-semibold text-gray-800">应用版本发布管理</h2>
        <span class="text-xs text-gray-400">管理员：{{ .AdminEmail }}</span>
    </header>

    <div class="p-8">
        <!-- 提示信息 -->
        <div id="alert-container"></div>

        <!-- 版本统计 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-xl p-6 shadow-sm">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">总版本数</p>
                        <p id="stat-total" class="text-3xl font-bold text-gray-800 mt-1">-</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center">
                        <i class="fas fa-list text-blue-500 text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-6 shadow-sm">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">macOS 活跃</p>
                        <p id="stat-macos" class="text-3xl font-bold text-gray-800 mt-1">-</p>
                    </div>
                    <div class="w-12 h-12 bg-purple-50 rounded-xl flex items-center justify-center">
                        <i class="fab fa-apple text-purple-500 text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-6 shadow-sm">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Windows 活跃</p>
                        <p id="stat-windows" class="text-3xl font-bold text-gray-800 mt-1">-</p>
                    </div>
                    <div class="w-12 h-12 bg-green-50 rounded-xl flex items-center justify-center">
                        <i class="fab fa-windows text-green-500 text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-6 shadow-sm">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">其他平台</p>
                        <p id="stat-other" class="text-3xl font-bold text-gray-800 mt-1">-</p>
                    </div>
                    <div class="w-12 h-12 bg-orange-50 rounded-xl flex items-center justify-center">
                        <i class="fas fa-layer-group text-orange-500 text-xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="mb-6 flex gap-3 flex-wrap">
            <button onclick="openCreateModal()" class="btn btn-primary">
                <i class="fas fa-plus mr-2"></i> 新建版本
            </button>
            <select id="filter-platform" onchange="loadVersions()"
                    class="border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-400">
                <option value="">全部平台</option>
                <option value="ios">iOS</option>
                <option value="android">Android</option>
                <option value="macos">macOS</option>
                <option value="windows">Windows</option>
                <option value="linux">Linux</option>
            </select>
        </div>

        <!-- 版本列表 -->
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100">
                <h3 class="font-semibold text-gray-800">版本列表</h3>
            </div>
            <div class="table-responsive">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50 text-gray-500 text-xs uppercase">
                        <tr>
                            <th class="px-6 py-3 text-left">版本号</th>
                            <th class="px-6 py-3 text-left">平台</th>
                            <th class="px-6 py-3 text-left">构建号</th>
                            <th class="px-6 py-3 text-left">状态</th>
                            <th class="px-6 py-3 text-left">强制更新</th>
                            <th class="px-6 py-3 text-left">发布时间</th>
                            <th class="px-6 py-3 text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="versions-tbody" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
            <div class="px-6 py-4 border-t border-gray-100 text-center text-sm text-gray-500" id="no-data">
                暂无版本记录
            </div>
        </div>
    </div>
</div>

<!-- 创建/编辑版本模态框 -->
<div id="form-modal" class="modal-backdrop">
    <div class="bg-white rounded-xl shadow-xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
        <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
            <h3 id="modal-title" class="text-lg font-semibold text-gray-800">新建版本</h3>
            <button onclick="closeModals()" class="text-gray-400 hover:text-gray-600">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <form id="version-form" onsubmit="handleFormSubmit(event)" class="p-6">
            <input type="hidden" id="form-id">

            <!-- 基本信息 -->
            <div class="mb-6">
                <h4 class="font-semibold text-gray-700 mb-4 flex items-center gap-2">
                    <i class="fas fa-info-circle text-blue-500"></i> 基本信息
                </h4>
                <div class="grid grid-cols-2 gap-4">
                    <div class="form-group">
                        <label>版本号 *</label>
                        <input type="text" id="form-version" placeholder="1.1.0" required>
                        <p class="text-xs text-gray-400 mt-1">格式：X.Y.Z (如 1.1.0)</p>
                    </div>
                    <div class="form-group">
                        <label>构建号 *</label>
                        <input type="number" id="form-buildNumber" placeholder="2" min="0" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>平台 *</label>
                    <select id="form-platform" onchange="updateFormFields()" required>
                        <option value="">-- 选择平台 --</option>
                        <option value="ios">iOS</option>
                        <option value="android">Android</option>
                        <option value="macos">macOS</option>
                        <option value="windows">Windows</option>
                        <option value="linux">Linux</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>更新描述 *</label>
                    <textarea id="form-description" placeholder="新增功能、修复的问题等..." required></textarea>
                </div>
            </div>

            <!-- 下载链接 -->
            <div class="mb-6">
                <h4 class="font-semibold text-gray-700 mb-4 flex items-center gap-2">
                    <i class="fas fa-download text-green-500"></i> 下载信息
                </h4>
                <div class="form-group">
                    <label>下载链接 *</label>
                    <input type="url" id="form-downloadUrl" placeholder="https://release.shepaw.com/download/..." required>
                </div>
                <div class="form-group">
                    <label>文件大小（字节，可选）</label>
                    <input type="number" id="form-fileSize" placeholder="52428800" min="0">
                </div>
                <div class="form-group">
                    <label>校验和（可选）</label>
                    <input type="text" id="form-checksum" placeholder="sha256:abc123...">
                </div>
            </div>

            <!-- 最低版本要求 -->
            <div class="mb-6" id="min-version-section">
                <h4 class="font-semibold text-gray-700 mb-4 flex items-center gap-2">
                    <i class="fas fa-layer-group text-purple-500"></i> 最低版本要求
                </h4>
                <div class="form-group" id="field-minIosVersion" style="display:none;">
                    <label>最低 iOS 版本（可选）</label>
                    <input type="text" id="form-minIosVersion" placeholder="14.0">
                </div>
                <div class="form-group" id="field-minAndroidSdk" style="display:none;">
                    <label>最低 Android SDK（可选）</label>
                    <input type="number" id="form-minAndroidSdk" placeholder="21" min="0">
                </div>
                <div class="form-group" id="field-minMacOSVersion" style="display:none;">
                    <label>最低 macOS 版本（可选）</label>
                    <input type="text" id="form-minMacOSVersion" placeholder="11.0">
                </div>
                <div class="form-group" id="field-minWindowsVersion" style="display:none;">
                    <label>最低 Windows 版本（可选）</label>
                    <input type="text" id="form-minWindowsVersion" placeholder="10.0">
                </div>
                <p class="text-xs text-gray-400" id="min-version-hint">Linux 平台无最低版本要求配置</p>
            </div>

            <!-- 发布设置 -->
            <div class="mb-6">
                <h4 class="font-semibold text-gray-700 mb-4 flex items-center gap-2">
                    <i class="fas fa-cog text-orange-500"></i> 发布设置
                </h4>
                <div class="form-group">
                    <label>发布时间 *</label>
                    <input type="datetime-local" id="form-releaseDate" required>
                </div>
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="form-isMandatory">
                        <label style="margin-bottom: 0;">强制更新</label>
                    </div>
                    <p class="text-xs text-gray-400 mt-1">勾选后用户将无法跳过此版本</p>
                </div>
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="form-active" checked>
                        <label style="margin-bottom: 0;">设为活跃版本</label>
                    </div>
                    <p class="text-xs text-gray-400 mt-1">该平台的活跃版本将被替换为此版本</p>
                </div>
            </div>

            <!-- 按钮 -->
            <div class="flex gap-3 justify-end">
                <button type="button" onclick="closeModals()" class="btn btn-secondary">取消</button>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save mr-2"></i> 保存
                </button>
            </div>
        </form>
    </div>
</div>

<!-- 加载指示器 -->
<div id="loading" class="loading">
    <div class="spinner"></div>
</div>

<script>
    const API_BASE = '/admin/api';

    // ==================== 初始化 ====================
    document.addEventListener('DOMContentLoaded', () => {
        loadVersions();
        loadStats();
    });

    // ==================== 数据加载 ====================
    async function loadVersions() {
        showLoading(true);
        try {
            const platform = document.getElementById('filter-platform').value;
            const url = `${API_BASE}/app-versions${platform ? '?platform=' + platform : ''}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const data = await response.json();
            const versions = data.versions || [];
            
            if (versions.length === 0) {
                document.getElementById('versions-tbody').innerHTML = '';
                document.getElementById('no-data').style.display = 'block';
                return;
            }

            document.getElementById('no-data').style.display = 'none';
            document.getElementById('versions-tbody').innerHTML = versions.map(v => {
                const releaseDate = new Date(v.releaseDate).toLocaleString('zh-CN');
                return `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="px-6 py-4 font-mono">${escapeHtml(v.version)}</td>
                        <td class="px-6 py-4">
                            <span class="badge badge-blue">${escapeHtml(v.platform)}</span>
                        </td>
                        <td class="px-6 py-4">${v.buildNumber}</td>
                        <td class="px-6 py-4">
                            ${v.active ? '<span class="badge badge-green"><span class="status-indicator status-active"></span>活跃</span>' : '<span class="badge badge-gray"><span class="status-indicator status-inactive"></span>冻结</span>'}
                        </td>
                        <td class="px-6 py-4">
                            ${v.isMandatory ? '<span class="badge badge-red">强制</span>' : '<span class="badge badge-gray">可选</span>'}
                        </td>
                        <td class="px-6 py-4 text-gray-500">${releaseDate}</td>
                        <td class="px-6 py-4 text-center space-x-2">
                            <button onclick="editVersion('${escapeHtml(v.id)}')" class="text-indigo-600 hover:text-indigo-900 transition">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteVersion('${escapeHtml(v.id)}')" class="text-red-600 hover:text-red-900 transition">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        } catch (err) {
            showAlert('加载版本失败: ' + err.message, 'error');
        } finally {
            showLoading(false);
        }
    }

    async function loadStats() {
        try {
            const response = await fetch(`${API_BASE}/app-versions`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const data = await response.json();
            const versions = data.versions || [];
            
            const stats = {
                total: versions.length,
                macos: versions.filter(v => v.platform === 'macos' && v.active).length,
                windows: versions.filter(v => v.platform === 'windows' && v.active).length,
                other: versions.filter(v => !['macos', 'windows'].includes(v.platform) && v.active).length
            };

            document.getElementById('stat-total').textContent = stats.total;
            document.getElementById('stat-macos').textContent = stats.macos;
            document.getElementById('stat-windows').textContent = stats.windows;
            document.getElementById('stat-other').textContent = stats.other;
        } catch (err) {
            console.error('Failed to load stats:', err);
        }
    }

    // ==================== 模态框操作 ====================
    function openCreateModal() {
        resetForm();
        document.getElementById('modal-title').textContent = '新建版本';
        updateFormFields();
        document.getElementById('form-modal').classList.add('show');
    }

    async function editVersion(id) {
        try {
            // 从列表中查找版本（实际应该请求后端获取完整数据）
            // 为简化起见，这里使用 list 中的数据
            const response = await fetch(`${API_BASE}/app-versions`);
            const data = await response.json();
            const version = data.versions?.find(v => v.id === id);
            
            if (!version) throw new Error('版本未找到');

            // 填充表单
            document.getElementById('form-id').value = version.id;
            document.getElementById('form-version').value = version.version;
            document.getElementById('form-buildNumber').value = version.buildNumber;
            document.getElementById('form-platform').value = version.platform;
            document.getElementById('form-description').value = version.description || '';
            document.getElementById('form-downloadUrl').value = version.downloadUrl || '';
            document.getElementById('form-fileSize').value = version.fileSize || '';
            document.getElementById('form-checksum').value = version.checksum || '';
            document.getElementById('form-minIosVersion').value = version.minIosVersion || '';
            document.getElementById('form-minAndroidSdk').value = version.minAndroidSdk || '';
            document.getElementById('form-minMacOSVersion').value = version.minMacOSVersion || '';
            document.getElementById('form-minWindowsVersion').value = version.minWindowsVersion || '';
            document.getElementById('form-isMandatory').checked = version.isMandatory || false;
            document.getElementById('form-active').checked = version.active || false;

            // 更新字段显隐
            updateFormFields();

            // 设置时间
            if (version.releaseDate) {
                const date = new Date(version.releaseDate);
                document.getElementById('form-releaseDate').value = date.toISOString().slice(0, 16);
            }

            document.getElementById('modal-title').textContent = '编辑版本';
            document.getElementById('form-modal').classList.add('show');
        } catch (err) {
            showAlert('编辑版本失败: ' + err.message, 'error');
        }
    }

    function closeModals() {
        document.getElementById('form-modal').classList.remove('show');
    }

    function resetForm() {
        document.getElementById('version-form').reset();
        document.getElementById('form-id').value = '';
    }

    // ==================== 平台字段显隐 ====================
    function updateFormFields() {
        const platform = document.getElementById('form-platform').value;

        // 各平台对应的字段 ID
        const platformFields = {
            ios:     ['field-minIosVersion'],
            android: ['field-minAndroidSdk'],
            macos:   ['field-minMacOSVersion'],
            windows: ['field-minWindowsVersion'],
            linux:   [],
        };

        // 所有最低版本字段 ID
        const allFields = ['field-minIosVersion', 'field-minAndroidSdk', 'field-minMacOSVersion', 'field-minWindowsVersion'];
        const hint = document.getElementById('min-version-hint');

        // 隐藏所有字段
        allFields.forEach(id => {
            document.getElementById(id).style.display = 'none';
        });

        if (!platform) {
            hint.style.display = 'none';
            return;
        }

        hint.style.display = 'none';

        const visibleFields = platformFields[platform] || [];
        visibleFields.forEach(id => {
            document.getElementById(id).style.display = '';
        });

        // linux 平台无最低版本字段，显示说明
        if (platform === 'linux') {
            hint.style.display = '';
        }
    }

    // ==================== 表单提交 ====================
    async function handleFormSubmit(event) {
        event.preventDefault();
        showLoading(true);

        try {
            const id = document.getElementById('form-id').value;
            const platform = document.getElementById('form-platform').value;
            const payload = {
                version: document.getElementById('form-version').value,
                buildNumber: parseInt(document.getElementById('form-buildNumber').value),
                platform,
                description: document.getElementById('form-description').value,
                downloadUrl: document.getElementById('form-downloadUrl').value,
                fileSize: document.getElementById('form-fileSize').value ? parseInt(document.getElementById('form-fileSize').value) : 0,
                checksum: document.getElementById('form-checksum').value,
                // 仅提交当前平台相关的最低版本字段，其余清空
                minIosVersion: platform === 'ios' ? document.getElementById('form-minIosVersion').value : '',
                minAndroidSdk: platform === 'android' && document.getElementById('form-minAndroidSdk').value ? parseInt(document.getElementById('form-minAndroidSdk').value) : 0,
                minMacOSVersion: platform === 'macos' ? document.getElementById('form-minMacOSVersion').value : '',
                minWindowsVersion: platform === 'windows' ? document.getElementById('form-minWindowsVersion').value : '',
                isMandatory: document.getElementById('form-isMandatory').checked,
                active: document.getElementById('form-active').checked,
                releaseDate: document.getElementById('form-releaseDate').value
            };

            const response = await fetch(`${API_BASE}/app-versions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || `HTTP ${response.status}`);
            }

            showAlert('版本保存成功', 'success');
            closeModals();
            loadVersions();
            loadStats();
        } catch (err) {
            showAlert('保存失败: ' + err.message, 'error');
        } finally {
            showLoading(false);
        }
    }

    // ==================== 删除版本 ====================
    async function deleteVersion(id) {
        if (!confirm('确认删除此版本？删除后无法恢复。')) return;

        showLoading(true);
        try {
            const response = await fetch(`${API_BASE}/app-versions/${id}`, {
                method: 'DELETE'
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || `HTTP ${response.status}`);
            }

            showAlert('版本已删除', 'success');
            loadVersions();
            loadStats();
        } catch (err) {
            showAlert('删除失败: ' + err.message, 'error');
        } finally {
            showLoading(false);
        }
    }

    // ==================== 辅助函数 ====================
    function showAlert(message, type = 'info') {
        const container = document.getElementById('alert-container');
        const alert = document.createElement('div');
        alert.className = `alert alert-${type}`;
        alert.innerHTML = message;
        container.appendChild(alert);
        setTimeout(() => alert.remove(), 5000);
    }

    function showLoading(show) {
        document.getElementById('loading').classList.toggle('show', show);
    }

    function escapeHtml(text) {
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        };
        return text.replace(/[&<>"']/g, m => map[m]);
    }
</script>
