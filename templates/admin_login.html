<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Channel Service - 管理员登录</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center">
    <div class="max-w-sm w-full mx-4">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl mb-4">
                <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white">管理后台</h1>
            <p class="text-gray-500 text-sm mt-1">仅限授权管理员访问</p>
        </div>

        <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8 shadow-2xl">
            <!-- 错误提示 -->
            <div id="error-banner" class="hidden mb-5 p-3 bg-red-900 border border-red-700 rounded-lg text-red-300 text-sm text-center"></div>

            <button onclick="loginWithGoogle()"
                class="w-full flex items-center justify-center gap-3 py-3 px-4 bg-white hover:bg-gray-100 text-gray-800 rounded-xl transition font-medium shadow">
                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                使用 Google 账号登录
            </button>

            <p class="text-center text-gray-600 text-xs mt-5">
                仅授权管理员账号可登录
            </p>
        </div>
    </div>

    <script>
        // 显示错误
        const params = new URLSearchParams(location.search);
        const err = params.get('error');
        const errMap = {
            'unauthorized':           '❌ 该账号无管理员权限',
            'no_code':                '授权失败：未获取到授权码',
            'invalid_state':          '授权失败：state 校验失败，请重试',
            'google_exchange_failed': '授权失败：无法换取 Google Token',
            'google_userinfo_failed': '授权失败：无法获取 Google 用户信息',
        };
        if (err && errMap[err]) {
            const banner = document.getElementById('error-banner');
            banner.textContent = errMap[err];
            banner.classList.remove('hidden');
        }

        function loginWithGoogle() {
            window.location.href = '/admin/auth/google/initiate';
        }
    </script>
</body>
</html>
