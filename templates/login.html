<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Channel Service - 管理登录</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white">Channel Service</h1>
            <p class="text-gray-400 mt-2">应用通信代理服务</p>
        </div>

        <div class="bg-gray-800 rounded-xl shadow-2xl p-8">
            <h2 class="text-xl font-semibold text-white mb-6 text-center">登录</h2>

            <!-- 微信扫码登录 (国内用户) -->
            <div id="wechat-section">
                <button onclick="showWechatLogin()" 
                    class="w-full flex items-center justify-center py-3 px-4 bg-green-600 hover:bg-green-700 text-white rounded-lg transition mb-4">
                    <i class="fab fa-weixin mr-2 text-xl"></i>
                    微信扫码登录
                </button>
            </div>

            <div class="relative my-4">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-600"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-gray-800 text-gray-400">或</span>
                </div>
            </div>

            <!-- Google登录 (海外用户) -->
            <button onclick="loginWithGoogle()"
                class="w-full flex items-center justify-center py-3 px-4 bg-white hover:bg-gray-100 text-gray-800 rounded-lg transition font-medium">
                <svg class="mr-2 w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                使用 Google 账号登录
            </button>

            <p class="text-center text-gray-500 text-xs mt-6">
                登录即表示同意 <a href="#" class="text-blue-400 hover:underline">服务条款</a> 和 <a href="#" class="text-blue-400 hover:underline">隐私政策</a>
            </p>
        </div>
    </div>

    <!-- 微信二维码弹窗 -->
    <div id="wechat-modal" class="hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl p-8 max-w-sm w-full mx-4 text-center">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">微信扫码登录</h3>
            <div id="qrcode-container" class="flex justify-center mb-4">
                <div class="w-48 h-48 bg-gray-100 flex items-center justify-center rounded" id="qrcode-placeholder">
                    <p class="text-gray-400 text-sm">加载二维码...</p>
                </div>
            </div>
            <p class="text-gray-600 text-sm mb-4">请使用微信扫描二维码登录</p>
            <button onclick="closeWechatModal()" class="text-gray-500 hover:text-gray-700 text-sm">关闭</button>
        </div>
    </div>

    <script>
        // 检测是否在中国（通过时区或语言）
        const isChina = Intl.DateTimeFormat().resolvedOptions().timeZone.includes('Asia/Shanghai') ||
                        navigator.language === 'zh-CN';

        function showWechatLogin() {
            document.getElementById('wechat-modal').classList.remove('hidden');
            loadWechatQRCode();
        }

        function closeWechatModal() {
            document.getElementById('wechat-modal').classList.add('hidden');
        }

        async function loadWechatQRCode() {
            try {
                const resp = await fetch('/api/v1/auth/wechat/qrcode');
                const data = await resp.json();

                if (data.qrcode_url) {
                    const img = document.createElement('img');
                    img.src = data.qrcode_url;
                    img.className = 'w-48 h-48';
                    document.getElementById('qrcode-placeholder').innerHTML = '';
                    document.getElementById('qrcode-placeholder').appendChild(img);

                    // 轮询二维码状态
                    pollQRCodeStatus(data.scene_id);
                }
            } catch (err) {
                console.error('Failed to load QR code:', err);
            }
        }

        async function pollQRCodeStatus(sceneId) {
            const interval = setInterval(async () => {
                try {
                    const resp = await fetch(`/api/v1/auth/wechat/status?scene_id=${sceneId}`);
                    const data = await resp.json();

                    if (data.status === 'confirmed') {
                        clearInterval(interval);
                        localStorage.setItem('access_token', data.token);
                        window.location.href = '/dashboard';
                    }
                } catch (err) {
                    console.error('QR code poll error:', err);
                }
            }, 2000);

            // 5分钟后停止轮询
            setTimeout(() => clearInterval(interval), 5 * 60 * 1000);
        }

        function loginWithGoogle() {
            // 跳转到Google OAuth授权页
            window.location.href = '/api/v1/auth/google/initiate';
        }
    </script>
</body>
</html>
