<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Channel Service</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white flex flex-col min-h-screen items-center justify-center">
    <div class="text-center max-w-2xl px-4">
        <h1 class="text-5xl font-bold mb-4">Channel Service</h1>
        <p class="text-gray-400 text-xl mb-8">打通任意两个本地应用的通信代理服务</p>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
            <div class="bg-gray-800 rounded-xl p-4 text-center">
                <p class="text-2xl mb-1">🌐</p>
                <p class="text-sm text-gray-300">HTTP/HTTPS</p>
            </div>
            <div class="bg-gray-800 rounded-xl p-4 text-center">
                <p class="text-2xl mb-1">🔌</p>
                <p class="text-sm text-gray-300">WebSocket</p>
            </div>
            <div class="bg-gray-800 rounded-xl p-4 text-center">
                <p class="text-2xl mb-1">📡</p>
                <p class="text-sm text-gray-300">TCP/UDP</p>
            </div>
            <div class="bg-gray-800 rounded-xl p-4 text-center">
                <p class="text-2xl mb-1">⚡</p>
                <p class="text-sm text-gray-300">限流保护</p>
            </div>
        </div>

        <a href="/login" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-xl inline-block">
            开始使用 →
        </a>
    </div>
</body>
</html>
